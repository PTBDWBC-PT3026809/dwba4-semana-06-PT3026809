<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos - Inscrição</title>
    <link rel="icon" type="image/x-icon" href="dwba4_semana_imagens-master/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="cabecalho">
        <nav>
            <object width="100%" height="65px" data="menu.html"></object>
        </nav>
        <img src="dwba4_semana_imagens-master/Logo.jpg" alt="Instituto Federal São Paulo" width="250">
    </header>

    <main>
        <h2>Inscreva-se</h2>
        <form action="#" method="post">
            <label for="evento">Evento </label>
            <select id="evento" name="evento" required>
                <option value="">-- Selecione o Evento --</option>
                <option value="voe_sem_asas">Voe sem asas</option>
                <option value="festa_junina">Festa junina</option>
                <option value="semana_tecnologia">Semana de tecnologia</option>
            </select>

            <fieldset>
                <legend>Informações de Acesso</legend>
                <p>
                    <label for="usuario">Usuário </label>
                    <input type="text" id="usuario" name="usuario" required>
                </p>
                <p>
                    <label for="senha">Senha </label>
                    <input type="password" id="senha" name="senha" required>
                </p>
                <p>
                    <label for="confirme_senha">Confirme a Senha </label>
                    <input type="password" id="confirme_senha" name="confirme_senha" required>
                </p>
            </fieldset>

            <fieldset>
                <legend>Informações Pessoais</legend>
                <p>
                    <label for="nome">Nome Completo </label>
                    <input type="text" id="nome" name="nome" required>
                </p>
                <p>
                    <label for="email">E-mail </label>
                    <input type="email" id="email" name="email" required>
                </p>
                <p>
                    <label for="celular">Celular </label>
                    <input type="tel" id="celular" name="celular" placeholder="(99) 99999-9999" pattern="\(\d{2}\) \d{5}-\d{4}" title="Digite no formato (99) 99999-9999" required> (99) 99999-9999
                </p>
                <fieldset>
                    <legend>Sexo</legend>
                    <label><input type="radio" name="sexo" value="masculino" required> Masculino</label>
                    <label><input type="radio" name="sexo" value="feminino"> Feminino</label>
                </fieldset>
                <p>
                    <label for="nascimento">Data de Nascimento </label>
                    <input type="text" id="nascimento" name="nascimento" placeholder="dd/mm/aaaa" pattern="\d{2}/\d{2}/\d{4}" title="Digite no formato dd/mm/aaaa" required>
                </p>
                <p>
                    <label for="cor">Cor Favorita </label>
                    <input type="color" id="cor" name="cor">
                </p>
                <p>
                    <label for="github">Perfil no Github </label>
                    <input type="text" id="github" name="github">
                </p>
            </fieldset>

            <p>
                <button type="submit">Inscrever</button>
                <button type="reset">Limpar</button>
            </p>
        </form>
    </main>

    <object width="100%" height="120px" data="footer.html"></object>
</body>
</html>
